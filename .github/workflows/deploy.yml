name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Get Cloudflare Account ID
        run: |
          RESPONSE=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            "https://api.cloudflare.com/client/v4/accounts")
          ACCOUNT_ID=$(echo "$RESPONSE" | python3 -c "
import sys, json
d = json.load(sys.stdin)
if d.get('success') and d.get('result'):
    print(d['result'][0]['id'])
" 2>/dev/null || echo "")
          if [ -z "$ACCOUNT_ID" ]; then
            echo "Could not get account ID. Check your CLOUDFLARE_API_TOKEN secret."
            echo "$RESPONSE"
            exit 1
          fi
          echo "Got account ID successfully"
          echo "CLOUDFLARE_ACCOUNT_ID=$ACCOUNT_ID" >> $GITHUB_ENV

      - name: Deploy to Cloudflare Workers
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
