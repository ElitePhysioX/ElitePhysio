<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ElitePhysio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Heebo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ══════════════════════════════════════
     LOGIN SCREEN
══════════════════════════════════════ -->
<div id="LS">
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;position:relative;overflow:hidden;background:linear-gradient(155deg,#0d2248 0%,#1a3a6e 30%,#2B6CC4 65%,#5b9bd5 85%,#e8f2fb 100%)">
  <div style="position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(45deg,rgba(255,255,255,0.025) 0px,rgba(255,255,255,0.025) 1px,transparent 1px,transparent 40px)"></div>
  <div style="position:relative;width:100%;max-width:380px;text-align:center">
    <!-- Logo with glowing ring -->
    <div style="margin:0 auto 16px;width:200px;height:200px;position:relative">
      <!-- Outer glow halo -->
      <div style="position:absolute;inset:-12px;border-radius:50%;background:radial-gradient(circle,transparent 50%,rgba(120,200,255,0.12) 70%,transparent 88%);filter:blur(10px)"></div>
      <!-- Strong white cloudy inner fill -->
      <div style="position:absolute;inset:3px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,0.65) 0%,rgba(225,240,255,0.45) 40%,rgba(180,215,255,0.15) 75%,transparent 100%)"></div>
      <!-- Glowing ring on top -->
      <div style="position:absolute;inset:0;border-radius:50%;border:2.5px solid rgba(255,255,255,0.9);box-shadow:0 0 14px rgba(150,220,255,0.9),0 0 30px rgba(100,180,255,0.6),0 0 55px rgba(43,108,196,0.4);z-index:2"></div>
      <!-- Logo - scaled large, clipped to circle, truly centered -->
      <!-- Coin shine hover effect -->
      <style>
        #logo-outer { transition: filter 0.4s ease; cursor: pointer; border-radius: 50%; }
        #logo-outer:hover { filter: drop-shadow(0 0 22px rgba(200,235,255,1)) drop-shadow(0 0 45px rgba(150,210,255,0.85)) drop-shadow(0 0 70px rgba(100,180,255,0.6)); }
        #logo-outer:hover .logo-img { filter: brightness(1.5) drop-shadow(0 0 18px rgba(255,255,255,0.95)) drop-shadow(0 0 35px rgba(200,235,255,0.85)); }
        .logo-img { transition: filter 0.4s ease; }
        .hdr-logo { transition: filter 0.4s ease; cursor: pointer; border-radius: 50%; }
        .hdr-logo:hover { filter: drop-shadow(0 0 12px rgba(200,235,255,1)) drop-shadow(0 0 24px rgba(150,210,255,0.8)); }
        .hdr-logo:hover .hdr-logo-img { filter: brightness(1.5) drop-shadow(0 0 10px rgba(255,255,255,0.95)); }
        .hdr-logo-img { transition: filter 0.4s ease; }
      </style>
      <div id="logo-outer" style="position:absolute;inset:0;border-radius:50%;background:transparent">
        <div id="logo-ring" style="position:absolute;inset:4px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center">
          <img class="logo-img" src="ElitePhysioLogo.png?v=4" alt="ElitePhysio" style="width:340px;height:340px;object-fit:contain;flex-shrink:0;margin-left:15px">
        </div>
      </div>
    </div>

    <!-- Clinic name with depth -->
    <div style="font-size:32px;font-weight:300;letter-spacing:6px;margin-bottom:5px;text-transform:uppercase;
      text-shadow:0 1px 0 rgba(255,255,255,0.8),0 2px 6px rgba(0,0,0,0.3);
      color:#ffffff">ElitePhysio</div>
    <div id="l-tagline" style="font-size:11px;color:rgba(255,255,255,0.75);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:28px;text-shadow:0 1px 4px rgba(0,0,0,0.3)"></div>

    <!-- Patient Login -->
    <div style="background:#fff;border-radius:18px;padding:26px 24px;box-shadow:0 8px 32px rgba(13,34,72,0.15);margin-bottom:14px">
      <div id="l-welcome" style="font-size:19px;font-weight:700;color:#1a3a6e;margin-bottom:4px"></div>
      <div id="l-intro" style="font-size:13px;color:#4a6a8a;margin-bottom:20px"></div>
      <div style="margin-bottom:12px">
        <div id="l-yn" class="lbl" style="color:#4a6a8a"></div>
        <input class="inp" id="pnm" placeholder="Full name" onkeydown="if(event.key==='Enter')plog()">
      </div>
      <div style="margin-bottom:18px">
        <div id="l-yp" class="lbl" style="color:#4a6a8a"></div>
        <input class="inp" id="ppi" type="password" maxlength="4" placeholder="PIN code" onkeydown="if(event.key==='Enter')plog()">
      </div>
      <div id="le2" style="color:#e05050;font-size:13px;margin-bottom:10px;display:none"></div>
      <button class="btn" style="width:100%;padding:12px;font-size:15px" onclick="plog()">
        <span id="l-enter"></span>
      </button>
      <div style="margin-top:12px;text-align:center">
        <button id="l-admin-btn" onclick="toggleAdmin()" style="background:none;border:none;color:#4a6a8a;font-size:12px;cursor:pointer;letter-spacing:.5px;text-decoration:underline"></button>
      </div>
    </div>

    <!-- Admin Box -->
    <div id="admin-box" class="hid" style="background:#1a2e50;border-radius:14px;padding:20px 24px;box-shadow:0 8px 32px rgba(13,34,72,0.25);margin-top:0px">
      <div id="l-al" class="lbl" style="color:rgba(255,255,255,0.7);margin-bottom:8px"></div>
      <input class="inp" id="apw" type="password" placeholder="Password" style="background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.15);color:#fff;margin-bottom:14px" onkeydown="if(event.key==='Enter')alog()">
      <div id="le1" style="color:#fca5a5;font-size:13px;margin-bottom:8px;display:none"></div>
      <div style="display:flex;gap:8px">
        <button class="btn btng" style="padding:10px 16px;font-size:18px" onclick="toggleAdmin()">&#8592;</button>
        <button class="btn" style="flex:1;padding:10px" onclick="alog()">Enter</button>
      </div>
    </div>

    <!-- Language flags - using flag images -->
    <div style="display:flex;justify-content:center;gap:10px;margin-top:18px;direction:ltr">
      <button id="fle" onclick="setL('en')" style="background:rgba(255,255,255,0.9);border:2.5px solid #fff;border-radius:8px;padding:5px 12px;cursor:pointer;line-height:1.3;box-shadow:0 2px 8px rgba(0,0,0,0.25);font-size:13px;font-weight:700;display:flex;align-items:center;gap:5px">
        <img src="https://flagcdn.com/w40/us.png" style="width:28px;height:auto;border-radius:3px"> EN
      </button>
      <button id="flh" onclick="setL('he')" style="background:rgba(255,255,255,0.12);border:2px solid rgba(255,255,255,0.3);border-radius:8px;padding:5px 12px;cursor:pointer;line-height:1.3;box-shadow:none;font-size:13px;font-weight:700;display:flex;align-items:center;gap:5px;color:rgba(255,255,255,0.9)">
        <img src="https://flagcdn.com/w40/il.png" style="width:28px;height:auto;border-radius:3px"> HE
      </button>
    </div>
  </div>
</div>
</div>

<!-- ══════════════════════════════════════
     ADMIN SCREEN
══════════════════════════════════════ -->
<div id="AS" class="hid">
  <header style="direction:ltr">
    <div style="display:flex;align-items:center;gap:12px">
      <div class="hdr-logo" style="width:46px;height:46px;position:relative;flex-shrink:0;cursor:pointer;border-radius:50%">
        <div style="position:absolute;inset:2px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,0.65) 0%,rgba(220,238,255,0.35) 50%,transparent 100%)"></div>
        <div style="position:absolute;inset:0;border-radius:50%;border:1.5px solid rgba(255,255,255,0.85);box-shadow:0 0 8px rgba(150,220,255,0.7),0 0 16px rgba(43,108,196,0.3);z-index:2"></div>
        <div style="position:absolute;inset:3px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center">
          <img class="hdr-logo-img" src="ElitePhysioLogo.png?v=4" alt="EP" style="width:80px;height:80px;object-fit:contain;flex-shrink:0;margin-left:4px">
        </div>
      </div>
      <div>
        <div style="font-size:15px;font-weight:300;color:#fff;letter-spacing:4px;text-transform:uppercase;text-shadow:0 1px 4px rgba(0,0,0,0.3)">ElitePhysio</div>
        <div style="font-size:10px;color:rgba(255,255,255,0.7);letter-spacing:1.5px;text-transform:uppercase" id="hdr-tag-a"></div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span id="svi" style="font-size:11px;color:rgba(255,255,255,0.8);display:none;align-items:center"><span class="spi"></span><span id="svt">Saving...</span></span>
      <button id="afle" onclick="setL('en')" style="background:rgba(255,255,255,0.9);border:2px solid #fff;border-radius:6px;padding:3px 8px;cursor:pointer;font-size:13px;font-weight:700;display:flex;align-items:center;gap:4px;color:#1a3a6e"><img src="https://flagcdn.com/w40/us.png" style="width:20px;height:auto;border-radius:2px"> EN</button>
      <button id="aflh" onclick="setL('he')" style="background:rgba(255,255,255,0.12);border:2px solid rgba(255,255,255,0.3);border-radius:6px;padding:3px 8px;cursor:pointer;font-size:13px;font-weight:700;display:flex;align-items:center;gap:4px;color:rgba(255,255,255,0.9)"><img src="https://flagcdn.com/w40/il.png" style="width:20px;height:auto;border-radius:2px"> HE</button>
      <button class="btn btng" style="font-size:12px;padding:6px 12px" onclick="dout()" id="alo">Log Out</button>
    </div>
  </header>
  <div class="topnav">
    <button class="nb on" id="nbd" onclick="gv('d')">Dashboard</button>
    <button class="nb" id="nbp" onclick="gv('p')">Patients</button>
    <button class="nb" id="nbs" onclick="gv('s')">Analytics</button>
  </div>
  <div class="page hid" id="vd"></div>
  <div class="page hid" id="vp">
    <div class="row"><span class="st" id="ptit">Patients</span><button class="btn" style="font-size:12px" onclick="om('ap')" id="pnb">+ New Patient</button></div>
    <input class="inp" id="psr" placeholder="Search..." oninput="rpl()" style="margin-bottom:14px">
    <div id="pls"></div>
  </div>
  <div class="page hid" id="vs"></div>
  <div class="page hid" id="vpat">
    <button class="btn" style="font-size:12px;margin-bottom:14px" onclick="gv('p')" id="pbk">Back</button>
    <div class="panel" id="phd"></div>
    <div style="display:flex;gap:6px;margin:14px 0 12px;flex-wrap:wrap;background:linear-gradient(90deg,#1a3a6e,#2B6CC4,#4a90d9,#2B6CC4,#1a3a6e);padding:9px 12px;border-radius:11px;border-bottom:2px solid rgba(255,255,255,0.2)" id="ptbs"></div>
    <div id="pet"></div>
    <div id="pft" class="hid"></div>
    <div id="pct" class="hid"></div>
  </div>
</div>

<!-- ══════════════════════════════════════
     PATIENT SCREEN
══════════════════════════════════════ -->
<div id="PS" class="hid">
  <header style="direction:ltr">
    <div style="display:flex;align-items:center;gap:12px">
      <div class="hdr-logo" style="width:46px;height:46px;position:relative;flex-shrink:0;cursor:pointer;border-radius:50%">
        <div style="position:absolute;inset:2px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,0.65) 0%,rgba(220,238,255,0.35) 50%,transparent 100%)"></div>
        <div style="position:absolute;inset:0;border-radius:50%;border:1.5px solid rgba(255,255,255,0.85);box-shadow:0 0 8px rgba(150,220,255,0.7),0 0 16px rgba(43,108,196,0.3);z-index:2"></div>
        <div style="position:absolute;inset:3px;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center">
          <img class="hdr-logo-img" src="ElitePhysioLogo.png?v=4" alt="EP" style="width:80px;height:80px;object-fit:contain;flex-shrink:0;margin-left:4px">
        </div>
      </div>
      <div>
        <div style="font-size:15px;font-weight:300;color:#fff;letter-spacing:4px;text-transform:uppercase;text-shadow:0 1px 4px rgba(0,0,0,0.3)">ElitePhysio</div>
        <div style="font-size:10px;color:rgba(255,255,255,0.7);letter-spacing:1.5px;text-transform:uppercase" id="hdr-tag-p"></div>
      </div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <button id="pfle" onclick="setL('en')" style="background:rgba(255,255,255,0.9);border:2px solid #fff;border-radius:6px;padding:3px 8px;cursor:pointer;font-size:13px;font-weight:700;display:flex;align-items:center;gap:4px;color:#1a3a6e"><img src="https://flagcdn.com/w40/us.png" style="width:20px;height:auto;border-radius:2px"> EN</button>
      <button id="pflh" onclick="setL('he')" style="background:rgba(255,255,255,0.12);border:2px solid rgba(255,255,255,0.3);border-radius:6px;padding:3px 8px;cursor:pointer;font-size:13px;font-weight:700;display:flex;align-items:center;gap:4px;color:rgba(255,255,255,0.9)"><img src="https://flagcdn.com/w40/il.png" style="width:20px;height:auto;border-radius:2px"> HE</button>
      <button class="btn btng" style="font-size:12px;padding:6px 12px" onclick="dout()" id="plo">Log Out</button>
    </div>
  </header>
  <div class="topnav" style="padding:5px 16px;min-height:12px"></div>
  <div class="page" style="max-width:720px">
    <div class="panel" id="psh"></div>
    <div style="display:flex;gap:6px;margin:14px 0 12px;flex-wrap:wrap;background:linear-gradient(90deg,#1a3a6e,#2B6CC4,#4a90d9,#2B6CC4,#1a3a6e);padding:9px 12px;border-radius:11px;border-bottom:2px solid rgba(255,255,255,0.2)" id="pstb"></div>
    <div id="psex"></div>
    <div id="psfu" class="hid"></div>
  </div>
</div>

<!-- Modal overlay -->
<div class="mbg" id="MB" onclick="if(event.target===this)cm()"><div class="mbox" id="MC"></div></div>
<!-- File upload (hidden) -->
<input type="file" id="fi" multiple accept="image/*,.pdf,.doc,.docx" style="display:none" onchange="hf(event)">

<!-- Scripts — order matters: data first, then app logic -->
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
